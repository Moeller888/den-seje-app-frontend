<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <title>Avatar</title>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      text-align: center;
    }

    .grid {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      justify-content: center;
    }

    .item {
      border: 2px solid #ccc;
      padding: 10px;
      width: 120px;
      border-radius: 10px;
      transition: 0.2s;
      background: #fafafa;
    }

    .item img {
      width: 100px;
      height: 100px;
      object-fit: cover;
      border-radius: 8px;
    }

    .item.active {
      border-color: green;
      background: #eaffea;
      transform: scale(1.05);
    }

    button {
      margin-top: 5px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>Din Avatar</h1>

<div id="current"></div>

<div class="grid" id="avatars"></div>

<br>
<button onclick="window.location.href='hub.html'">⬅️ Tilbage</button>

<script type="module">
import { supabase } from "./supabaseClient.js";

const avatarsDiv = document.getElementById("avatars");
const currentDiv = document.getElementById("current");

// 🔐 AUTH
const { data: sessionData } = await supabase.auth.getSession();

if (!sessionData.session) {
  window.location.replace("login.html");
}

const userId = sessionData.session.user.id;

// 🔥 LOAD ACTIVE
async function loadActive() {
  const { data } = await supabase
    .from("profiles")
    .select("active_avatar")
    .eq("id", userId)
    .maybeSingle();

  return data?.active_avatar ?? null;
}

// 🎒 LOAD OWNED AVATARS
async function loadOwnedAvatars() {
  const { data } = await supabase
    .from("user_items")
    .select(`
      item_id,
      shop_items (
        id,
        name,
        type,
        image_url
      )
    `)
    .eq("user_id", userId);

  if (!data) return [];

  return data
    .map(x => x.shop_items)
    .filter(item => item && item.type === "avatar");
}

// 🎯 EQUIP
async function equip(itemId) {
  const { data: sessionData } = await supabase.auth.getSession();
  const token = sessionData.session.access_token;

  const res = await fetch(
    "https://tjzbehwfagiwpwodsgwg.supabase.co/functions/v1/equip-avatar",
    {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${token}`
      },
      body: JSON.stringify({ item_id: itemId })
    }
  );

  const data = await res.json();

  if (!res.ok || data.error) {
    alert(data.error || "Fejl");
    return;
  }

  await loadUI();
}

// 🎨 RENDER
async function loadUI() {
  const active = await loadActive();
  const avatars = await loadOwnedAvatars();

  avatarsDiv.innerHTML = "";

  currentDiv.textContent = active
    ? "Aktiv avatar valgt"
    : "Ingen avatar valgt";

  avatars.forEach(item => {
    const div = document.createElement("div");
    div.className = "item";

    if (item.id === active) {
      div.classList.add("active");
    }

    div.innerHTML = `
      <img src="${item.image_url || ''}" alt="avatar">
      <div><strong>${item.name}</strong></div>
      <button ${item.id === active ? "disabled" : ""}>
        ${item.id === active ? "Udstyret" : "Udstyr"}
      </button>
    `;

    const btn = div.querySelector("button");

    if (item.id !== active) {
      btn.onclick = () => equip(item.id);
    }

    avatarsDiv.appendChild(div);
  });
}

// 🚀 INIT
await loadUI();

</script>

</body>
</html>
