<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <title>Login – DEN SEJE APP</title>

  <style>
    body {
      font-family: Arial, sans-serif;
    }

    .box {
      border: 1px solid #ccc;
      padding: 20px;
      max-width: 400px;
      margin: 100px auto;
    }

    input {
      width: 100%;
      padding: 8px;
      margin-bottom: 10px;
    }

    button {
      width: 100%;
      padding: 10px;
      cursor: pointer;
    }

    .message {
      margin-top: 10px;
      color: red;
    }
  </style>
</head>
<body>

  <div class="box">
    <h2>Login</h2>
    <form id="login-form">
      <input type="email" id="email" placeholder="Email">
      <input type="password" id="password" placeholder="Adgangskode">
      <button type="submit" id="loginBtn">Login</button>
    </form>
    <div class="message" id="message"></div>
  </div>

  <script type="module" src="./js/supabase.js"></script>
  <script type="module" src="./js/login.js"></script>

</body>
</html>
