<!DOCTYPE html>
<html lang="da">
<head>
  <link rel="stylesheet" href="style.css">
  <meta charset="UTF-8">
  <title>DEN SEJE APP</title>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
    }

    #menu-btn {
      position: absolute;
      top: 10px;
      left: 10px;
      cursor: pointer;
    }

    #logout-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      cursor: pointer;
    }

    h1 {
      margin-bottom: 20px;
    }

    .top-bar {
      display: flex;
      gap: 30px;
      align-items: center;
      margin-bottom: 20px;
    }

    #xp-bar-container {
      flex: 1;
      height: 20px;
      background: #ddd;
    }

    #xp-bar {
      height: 100%;
      background: green;
      width: 0%;
    }

    .game-container {
      display: flex;
      gap: 30px;
      align-items: flex-start;
    }

    .avatar-box {
      width: 140px;
      text-align: center;
    }

    .avatar-box img {
      width: 100%;
      border-radius: 12px;
      background: #ddd;
    }

    .question-box {
      flex: 1;
      padding: 15px;
      border-radius: 10px;
      transition: all 0.2s ease;
    }

    #question {
      font-size: 22px;
      margin-bottom: 15px;
    }

    .answer-row {
      display: flex;
      gap: 10px;
    }

    .answer-row input,
    .answer-row textarea {
      flex: 1;
      padding: 10px;
    }

    .answer-row button {
      padding: 10px 20px;
      cursor: pointer;
    }

    #options button {
      display: block;
      width: 100%;
      margin-top: 8px;
      padding: 10px;
    }

    .correct-flash {
      background: #d4edda !important;
      animation: pop 0.25s ease;
    }

    .incorrect-flash {
      background: #f8d7da !important;
      animation: shake 0.25s ease;
    }

    @keyframes pop {
      0% { transform: scale(1); }
      50% { transform: scale(1.03); }
      100% { transform: scale(1); }
    }

    @keyframes shake {
      0% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      50% { transform: translateX(5px); }
      75% { transform: translateX(-5px); }
      100% { transform: translateX(0); }
    }

    /* 🔥 NYT: FEEDBACK PANEL */
    #review-feedback {
      margin-top: 20px;
      padding: 10px;
      background: #f5f5f5;
      border-radius: 8px;
      font-size: 14px;
    }

  </style>
</head>

<body>

  <button id="menu-btn">☰ Menu</button>
  <button id="logout-btn">Log ud</button>

  <h1>DEN SEJE APP</h1>

  <div class="top-bar">
    <span>Level: <b id="level">1</b></span>
    <span>XP: <b id="xp">0</b></span>

    <div id="xp-bar-container">
      <div id="xp-bar"></div>
    </div>

    <span>Coins: <b id="coins">0</b></span>
  </div>

  <div class="game-container">

    <div class="avatar-box">
      <div id="avatar-display">Indlæser...</div>
    </div>

    <div class="question-box">
      <div id="question">Indlæser...</div>
      <div id="feedback"></div>
      <div id="options"></div>

      <!-- 🔥 DET HER MANGLER DU -->
      <div id="review-feedback"></div>

    </div>

  </div>

  <script type="module">
    document.getElementById("menu-btn").onclick = () => {
      window.location.href = "hub.html";
    };
  </script>

  <script type="module" src="supabaseClient.js"></script>
  <script type="module" src="app.js"></script>

</body>
</html>
