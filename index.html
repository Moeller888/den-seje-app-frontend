<!DOCTYPE html>
<html lang="da">
<head>
  <link rel="stylesheet" href="style.css">
  <meta charset="UTF-8">
  <title>DEN SEJE APP</title>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
    }

    #menu-btn {
      position: absolute;
      top: 10px;
      left: 10px;
      cursor: pointer;
    }

    #logout-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      cursor: pointer;
    }

    .top-bar {
      margin-top: 40px;
      margin-bottom: 20px;
    }

    .game-container {
      display: flex;
      gap: 20px;
      align-items: flex-start;
    }

    .avatar-box {
      width: 120px;
      text-align: center;
    }

    .avatar-box img {
      width: 100px;
      height: 100px;
      border-radius: 12px;
      background: #ddd;
    }

    .question-box {
      flex: 1;
    }

    #question {
      font-size: 20px;
      margin-bottom: 10px;
    }

    #options button {
      display: block;
      margin: 5px 0;
      padding: 10px;
      width: 100%;
      cursor: pointer;
    }

    textarea, input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
    }
  </style>
</head>

<body>

  <!-- NAV -->
  <button id="menu-btn">☰ Menu</button>
  <button id="logout-btn">Log ud</button>

  <h1>DEN SEJE APP</h1>

  <!-- 📊 PROGRESS -->
  <div class="top-bar">
    <p>Level: <span id="level">1</span></p>
    <p>XP: <span id="xp">0</span></p>

    <div id="xp-bar-container" style="width: 100%; height: 20px; background: #ddd;">
      <div id="xp-bar" style="height: 100%; background: green; width: 0%;"></div>
    </div>

    <p>Coins: <span id="coins">0</span></p>
  </div>

  <!-- 🎮 GAME AREA -->
  <div class="game-container">

    <!-- 🎭 AVATAR -->
    <div class="avatar-box">
      <div id="avatar-display">Indlæser...</div>
    </div>

    <!-- ❓ QUESTION -->
    <div class="question-box">
      <div id="question">Indlæser...</div>
      <div id="feedback"></div>
      <div id="options"></div>
    </div>

  </div>

  <!-- NAV SCRIPT -->
  <script type="module">
    document.getElementById("menu-btn").onclick = () => {
      window.location.href = "hub.html";
    };
  </script>

  <!-- APP -->
  <script type="module" src="supabaseClient.js"></script>
  <script type="module" src="app.js"></script>

</body>
</html>
