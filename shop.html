<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <title>Butik</title>
  <style>
    body {
      font-family: Arial;
      padding: 20px;
    }

    .item {
      border: 1px solid #ccc;
      padding: 10px;
      margin-bottom: 10px;
    }

    button {
      margin-top: 5px;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
  </style>
</head>

<body>

<h1>Butik</h1>

<div id="coins"></div>
<div id="shop"></div>

<button onclick="window.location.href='hub.html'">⬅️ Tilbage</button>

<script type="module">
import { supabase } from "./supabaseClient.js";

const shopDiv = document.getElementById("shop");
const coinsDiv = document.getElementById("coins");

// 🔐 AUTH CHECK
const { data: sessionData } = await supabase.auth.getSession();

if (!sessionData.session) {
  window.location.replace("login.html");
}

const userId = sessionData.session.user.id;

// 🔥 VIGTIG — hent din ANON KEY (samme som i supabaseClient.js)
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRqemJlaHdmYWdpd3B3b2RzZ3dnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2ODc5OTQsImV4cCI6MjA4NzI2Mzk5NH0.BzepnYLe6Khzqx9vTL3Ifa_zMRgjoGQ9Lw5seaoKMMc";

// 💰 LOAD COINS
async function loadCoins() {
  const { data, error } = await supabase
    .from("student_progress")
    .select("coins")
    .eq("student_id", userId);

  console.log("COINS RAW:", { data, error });

  if (error) {
    console.error("LOAD COINS ERROR:", error);
    coinsDiv.textContent = "Fejl ved loading coins";
    return;
  }

  const coins = data?.[0]?.coins ?? 0;
  coinsDiv.textContent = "Coins: " + coins;
}

// 🎒 LOAD OWNED ITEMS
async function loadOwned() {
  const { data, error } = await supabase
    .from("user_items")
    .select("item_id")
    .eq("user_id", userId);

  if (error) {
    console.error("LOAD OWNED ERROR:", error);
    return [];
  }

  return data?.map(x => x.item_id) ?? [];
}

// 🛒 LOAD SHOP
async function loadShop() {
  const { data: items, error } = await supabase
    .from("shop_items")
    .select("*");

  if (error) {
    console.error("LOAD SHOP ERROR:", error);
    shopDiv.textContent = "Fejl ved loading shop";
    return;
  }

  const owned = await loadOwned();

  shopDiv.innerHTML = "";

  items.forEach(item => {
    const div = document.createElement("div");
    div.className = "item";

    const isOwned = owned.includes(item.id);

    div.innerHTML = `
      <strong>${item.name}</strong><br>
      Pris: ${item.price} coins<br>
      <button ${isOwned ? "disabled" : ""}>
        ${isOwned ? "Ejet" : "Køb"}
      </button>
    `;

    const btn = div.querySelector("button");

    if (!isOwned) {
      btn.onclick = async () => {

        const { data: sessionData } = await supabase.auth.getSession();

        if (!sessionData.session) {
          alert("Ikke logget ind");
          window.location.replace("login.html");
          return;
        }

        const token = sessionData.session.access_token;

        const res = await fetch(
          "https://tjzbehwfagiwpwodsgwg.supabase.co/functions/v1/buy-item",
          {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "Authorization": `Bearer ${token}`,
              "apikey": SUPABASE_ANON_KEY
            },
            body: JSON.stringify({
              item_id: item.id
            })
          }
        );

        const data = await res.json();

        if (!res.ok || data?.error) {
          console.error("BUY ERROR:", data);
          alert(data?.error || "Fejl ved køb");
          return;
        }

        await loadCoins();
        await loadShop();
      };
    }

    shopDiv.appendChild(div);
  });
}

// 🚀 INIT
await loadCoins();
await loadShop();

</script>

</body>
</html>
