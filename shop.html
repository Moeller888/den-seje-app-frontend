<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <title>Butik</title>
  <style>
    body {
      font-family: Arial;
      padding: 20px;
    }

    .item {
      border: 1px solid #ccc;
      padding: 10px;
      margin-bottom: 10px;
    }

    button {
      margin-top: 5px;
    }
  </style>
</head>

<body>

<h1>Butik</h1>

<div id="coins"></div>
<div id="shop"></div>

<button onclick="window.location.href='hub.html'">⬅️ Tilbage</button>

<script type="module">
import { supabase } from "./supabaseClient.js";

const shopDiv = document.getElementById("shop");
const coinsDiv = document.getElementById("coins");

const { data: sessionData } = await supabase.auth.getSession();
if (!sessionData.session) {
  window.location.replace("login.html");
}

const userId = sessionData.session.user.id;

async function loadCoins() {
  const { data } = await supabase
    .from("student_progress")
    .select("coins")
    .eq("id", userId)
    .maybeSingle();

  coinsDiv.textContent = "Coins: " + (data?.coins ?? 0);
}

async function loadOwned() {
  const { data } = await supabase
    .from("user_items")
    .select("item_id")
    .eq("user_id", userId);

  return data?.map(x => x.item_id) ?? [];
}

async function loadShop() {
  const { data: items } = await supabase
    .from("shop_items")
    .select("*");

  const owned = await loadOwned();

  shopDiv.innerHTML = "";

  items.forEach(item => {
    const div = document.createElement("div");
    div.className = "item";

    const isOwned = owned.includes(item.id);

    div.innerHTML = `
      <strong>${item.name}</strong><br>
      Pris: ${item.price} coins<br>
      <button ${isOwned ? "disabled" : ""}>
        ${isOwned ? "Ejet" : "Køb"}
      </button>
    `;

    const btn = div.querySelector("button");

    if (!isOwned) {
      btn.onclick = async () => {
        const { data: sessionData } = await supabase.auth.getSession();

        const { data, error } = await supabase.functions.invoke("buy-item", {
          body: { item_id: item.id },
          headers: {
            Authorization: `Bearer ${sessionData.session.access_token}`
          }
        });

        if (error || data?.error) {
          alert(data?.error || "Fejl");
          return;
        }

        await loadCoins();
        await loadShop();
      };
    }

    shopDiv.appendChild(div);
  });
}

await loadCoins();
await loadShop();

</script>

</body>
</html>
